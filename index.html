<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HARMONY.ONL</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent-main: #80a3ff;
            --vk-color: #0077FF;
            --tg-color: #2AABEE;
            --text-dark: #121826;
            --text-gray: #6b7280;
            --bg-btn: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-image: url('background.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; 
            padding: 20px;
        }

        .title {
            font-weight: 800;
            font-size: clamp(2.5rem, 6vw, 5rem);
            color: var(--text-dark);
            letter-spacing: -0.03em;
            margin-bottom: 8px;
            cursor: default;
            transition: color 0.4s ease, text-shadow 0.4s ease;
        }

        .title:hover {
            color: var(--accent-main);
            text-shadow: 0 4px 24px rgba(128, 163, 255, 0.4);
        }

        .subtitle {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 40px;
            user-select: none;
        }

        .links-wrapper {
            display: flex;
            gap: 16px;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 32px;
            background-color: var(--bg-btn);
            border-radius: 16px;
            color: var(--text-dark);
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.02);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn svg {
            width: 28px;
            height: 28px;
            transition: fill 0.3s ease;
        }

        .btn-vk svg { 
            fill: var(--vk-color); 
        }
        
        .btn-vk:hover {
            background-color: var(--vk-color);
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(0, 119, 255, 0.3);
        }

        .btn-vk:hover svg { 
            fill: #ffffff; 
        }

        .btn-tg svg { 
            fill: var(--tg-color); 
        }
        
        .btn-tg:hover {
            background-color: var(--tg-color);
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(42, 171, 238, 0.3);
        }

        .btn-tg:hover svg { 
            fill: #ffffff; 
        }

        @media (max-width: 480px) {
            .links-wrapper {
                flex-direction: column;
                width: 100%;
                max-width: 280px;
            }
            .btn {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <h1 class="title">HARMONY.ONL</h1>
